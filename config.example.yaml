# wechat-skill 配置文件
# 复制为 config.yaml 后按实际需求修改

# ========================================
#   监听配置
# ========================================

# 单次监听时长（支持: 30s, 5min, 1h, 24h 等）
duration: "24h"

# 监听结束后是否关闭微信（长驻监听建议设为 false）
close_weixin: false

# ========================================
#   OpenClaw Webhook 配置
# ========================================

# OpenClaw Webhook 地址
openclaw_webhook_url: "http://127.0.0.1:18789/hooks/agent"

# OpenClaw Webhook Token（需与 openclaw.json 中一致）
openclaw_token: "your-token-here"

# ========================================
#   自动回复配置（可选）
# ========================================

# 默认自动回复内容
default_reply: "收到，稍后处理。"

# ========================================
#   监听的群列表
# ========================================

groups:
  # 示例群1：仅监听并推送，不自动回复
  - name: "群名称1"
    auto_reply: false

  # 示例群2：监听并自动回复
  - name: "群名称2"
    auto_reply: true
    reply_to_user: "你的微信名"   # 当消息包含此名字时触发回复

  # 示例群3：多用户触发
  - name: "群名称3"
    auto_reply: true
    reply_to_user:
      - "用户A"
      - "用户B"
